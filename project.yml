name: BrickCanvas
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    PRODUCT_NAME: BrickCanvas
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 26.4
targets:
  BrickCanvas:
    type: application
    platform: iOS
    deploymentTarget: "26.4"
    sources:
      - path: BrickCanvas
    resources:
      - path: BrickCanvas/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mpwg.BrickCanvas
        INFOPLIST_KEY_CFBundleDisplayName: BrickCanvas
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    scheme:
      testTargets:
        - BrickCanvasTests
  BrickCanvasTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.4"
    sources:
      - path: BrickCanvasTests
    dependencies:
      - target: BrickCanvas
    settings:
      base:
        PRODUCT_NAME: BrickCanvasTests
        PRODUCT_MODULE_NAME: BrickCanvasTests
        PRODUCT_BUNDLE_IDENTIFIER: com.mpwg.BrickCanvasTests
        GENERATE_INFOPLIST_FILE: YES
