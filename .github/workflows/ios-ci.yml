name: iOS CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and test on macOS 26 / Xcode 26.4
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show available simulator runtimes
        run: xcrun simctl list runtimes available

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Boot installed CI simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail

          simulator_udid="$(
            xcrun simctl list devices available -j \
              | jq -r '
                  if .devices["com.apple.CoreSimulator.SimRuntime.iOS-26-4"] != null then
                    (
                      .devices["com.apple.CoreSimulator.SimRuntime.iOS-26-4"][]
                      | select(.name == "iPhone 17")
                      | .udid
                    )
                  elif .devices["com.apple.CoreSimulator.SimRuntime.iOS-26-2"] != null then
                    (
                      .devices["com.apple.CoreSimulator.SimRuntime.iOS-26-2"][]
                      | select(.name == "iPhone 17")
                      | .udid
                    )
                  else
                    empty
                  end
                ' \
              | head -n1
          )"

          if [[ -z "${simulator_udid}" ]]; then
            echo "Kein installierter iPhone-17-Simulator für iOS 26.4 oder 26.2 gefunden." >&2
            exit 1
          fi

          xcrun simctl boot "${simulator_udid}"
          xcrun simctl bootstatus "${simulator_udid}" -b

          echo "simulator_udid=${simulator_udid}" >> "${GITHUB_OUTPUT}"

      - name: Build app
        run: >
          xcodebuild
          -project BrickCanvas.xcodeproj
          -scheme BrickCanvas
          -destination 'generic/platform=iOS Simulator'
          build

      - name: Run tests
        run: >
          xcodebuild
          -project BrickCanvas.xcodeproj
          -scheme BrickCanvas
          -destination "id=${{ steps.simulator.outputs.simulator_udid }}"
          test
